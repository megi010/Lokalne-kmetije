{% extends "base.html" %}
{% block title %}Prijava - Lokalna tržnica{% endblock %}

{% block content %}
<main class="main" style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
    
    <div class="card" style="width: 100%; max-width: 400px; padding: 2.5rem 2rem; text-align: center;">
        <span style="font-size: 40px; display: block; margin-bottom: 10px;">👋</span>
        <h2 class="section-title" style="justify-content: center; margin-bottom: 5px;">Dobrodošli nazaj</h2>
        <p style="color: #8B6F5C; margin-bottom: 2rem; font-size: 14px;">Prijavite se za nakup domačih dobrot.</p>
        
        <form action="/" method="GET" style="display: flex; flex-direction: column; gap: 15px; text-align: left;">
            <div>
                <label style="font-weight: 700; font-size: 12px; color: #854F0B; text-transform: uppercase; letter-spacing: 0.05em;">E-poštni naslov</label><br>
                <input type="email" placeholder="ime.priimek@gmail.com" required style="width: 100%; padding: 12px; border: 2px solid #EDE0CF; border-radius: 10px; font-family: 'Nunito', sans-serif; font-size: 15px; margin-top: 5px; outline: none;">
            </div>
            
            <div>
                <label style="font-weight: 700; font-size: 12px; color: #854F0B; text-transform: uppercase; letter-spacing: 0.05em;">Geslo</label><br>
                <input type="password" placeholder="••••••••" required style="width: 100%; padding: 12px; border: 2px solid #EDE0CF; border-radius: 10px; font-family: 'Nunito', sans-serif; font-size: 15px; margin-top: 5px; outline: none;">
            </div>
            
            <button type="submit" class="btn-primary" style="margin-top: 10px; width: 100%; font-size: 16px; padding: 14px;">
                Prijavi se
            </button>
        </form>
    </div>

</main>
{% endblock %}
