{% extends "base.html" %}
{% block title %}Lokalna tržnica - Kmetije{% endblock %}

{% block content %}
<main class="main">
    <div class="section-header">
        <h2 class="section-title">Lokalne kmetije</h2>
        <span class="section-pill">{{ kmetije | length }} kmetij</span>
    </div>

    {% if kmetije %}
        {% include "partials/_farms_table.html" %}
    {% else %}
        <p class="empty-note">Trenutno ni vpisanih kmetij.</p>
    {% endif %}
</main>
{% endblock %}
